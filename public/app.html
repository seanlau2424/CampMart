<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Camp Mart</title>
    <link rel="stylesheet" href="app.css" />
</head>

<body>
    <header class="top-header">
        <div class="header-title">
            ~Youth Camp Mart~
        </div>
        <button class="admin-button" id="adminLogin">
            Admin Login
        </button>
    </header>
    <div class="rotate-message">
        <div class="rotate-icon">↻</div>
        <div class="rotate-text">
            Please rotate your device to landscape mode
        </div>
    </div>

    <div class="container">
        <div class="scanner-area">
            <button class="scan-button" id="scanButton">
                Scan Item
            </button>

            <div class="camera-container" id="cameraContainer">
                <div class="video-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <div class="scan-overlay">
                        <div class="scan-box">
                            <div class="scan-line"></div>
                        </div>
                    </div>
                </div>
                <div class="camera-controls">
                    <button class="flip-camera" id="flipCamera">
                        Flip Camera
                    </button>
                    <button class="close-scan" id="closeScan">
                        Close Scanner
                    </button>
                </div>
            </div>
        </div>

        <div class="cart-area">
            <div class="cart-title">
                Your Cart
            </div>

            <div class="cart-items" id="cartItems">
            </div>

            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">RM 0.00</span>
            </div>

            <button class="checkout-button" id="checkoutButton">
                Checkout
            </button>
        </div>
    </div>
    <div class="checkout-modal" id="checkoutModal">
    <div class="checkout-modal-content">
        <div class="checkout-title">
            Total Payable
        </div>

        <div class="checkout-total" id="checkoutTotal">
            RM 0.00
        </div>

        <div class="checkout-buttons">
            <button class="cancel-checkout-button" id="cancelCheckout">
                Cancel
            </button>

            <button class="paid-button" id="paidButton">
                I've Paid
            </button>
        </div>
    </div>
</div>
    <script type="module" src="scanner.js"></script>
</body>
</html>
